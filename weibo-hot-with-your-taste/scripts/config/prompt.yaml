judge_prompt: |
  你是一个新闻重要性评估专家，请判断以下热搜是否值得推送（最多不要超过5条）。

  === 用户偏好 ===

  关注关键词：{domain_keywords}
  感兴趣的分类：{liked_categories}
  不感兴趣的分类：{disliked_categories}
  召回关键词（被排除分类但命中时救回）：{recall_keywords}

  === 判断标准 ===

  【yes】范围：
  {yes_criteria}

  【no】范围：
  {no_criteria}

  === 话题列表 ===
  {topics_text}

  === 输出格式 ===
  严格按顺序输出，每行格式："序号:【yes】"或"序号:【no】"，不要输出话题名称，不要输出其他内容，不要遗漏任何一条：
  1:【yes】
  2:【no】
  3:【yes】
  ...

  必须包含全部 {topics_count} 条话题的判断。

second_filter_prompt: |
  你是一个信息精选助手。以下是今天多次抓取积累的微博热点话题（已通过初筛），请从中选出最重要、最值得推送的若干条。

  === 精选标准 ===
  - 优先选择具有重大影响或深远意义的新闻
  - 考虑话题多样性，避免同一领域或同一事件过度集中
  - 同一事件的不同角度报道只保留最重要的一条
  - 严格控制数量，宁缺毋滥，只选真正值得推送的

  === 候选话题 ===
  {topics_text}

  === 输出格式 ===
  按重要性从高到低，每行仅输出选中话题的序号（数字），不要输出话题名称或其他内容：
  3
  7
  1
  ...

init_keywords_prompt: |
  你是一个用户偏好分析专家。用户提供了3个关注关键词：{domain_keywords}。

  以下是微博热搜的所有分类：
  {category_list}

  请根据关键词的语义，从以上分类中选出：
  - 10个用户可能感兴趣的分类（liked）
  - 10个用户可能不感兴趣的分类（disliked）

  选中的分类应与关键词有明确的语义关联。如果分类总数不足，可以适当减少。

  === 输出格式 ===
  每行格式："序号:liked/disliked:分类名"，严格按序号输出：
  1:liked:国内时政
  2:disliked:娱乐
  3:liked:财经
  ...

  必须覆盖所有选中的分类。

init_criteria_prompt: |
  你是一个新闻筛选 prompt 设计专家。请根据以下用户偏好，生成新闻判断标准。

  === 用户偏好 ===
  关注关键词：{domain_keywords}
  感兴趣的分类：{liked_categories}
  不感兴趣的分类：{disliked_categories}
  召回关键词：{recall_keywords}

  === 要求 ===
  请生成两段判断标准：

  【yes】范围：列出用户可能感兴趣的新闻类型，每条一行，格式为"领域：具体描述"
  【no】范围：列出用户可能不感兴趣的新闻类型，每条一行，格式同上

  判断标准应：
  1. 与用户的关注关键词和分类选择高度相关
  2. 具体到可以区分同类中的不同新闻（如"AI大模型突破"yes但"手机发布"no）
  3. 覆盖用户感兴趣和不感兴趣的主要领域
  4. 召回关键词对应的领域应在yes范围中重点体现

  === 输出格式 ===
  ===yes===
  领域1：描述
  领域2：描述
  ...

  ===no===
  领域1：描述
  领域2：描述
  ...

summary_prompt: |
  你是一个新闻摘要专家。请根据以下微博内容，生成一句话摘要。

  话题名：{topic_name}
  微博内容：
  {weibo_content}

  要求：
  1. 摘要不超过{max_len}个字
  2. 只陈述事实，不要评价
  3. 聚焦核心事件，忽略无关细节

  直接输出摘要，不要输出其他内容。
